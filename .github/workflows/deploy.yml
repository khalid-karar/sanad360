# Sanad 360 — CD pipeline (see DEPLOYMENT.md)
#
# Environments are config-only deployment targets. This workflow runs for
# pushes to main ONLY after ci.yml succeeds, deploys the SAME commit to
# staging, and then to production behind the "production" GitHub Environment's
# required-reviewers gate.
#
# Hosts: frontend on Netlify (CLI deploy of the already-built ./dist), PDF
# service on Railway (CLI deploy of services/pdf, built there from its
# Dockerfile). Both read their auth from the environment-scoped secrets
# below — never from the repo.
#
# Safety rails:
#   • migrations are promoted with `supabase db push` (forward-only) via
#     scripts/db-target.mjs — remote resets are impossible from this repo
#   • staging is seeded with FAKE demo data; the production job has NO seed
#     step and scripts/db-target.mjs hard-aborts any prod seed attempt
#   • all secrets come from GitHub Environments, never from the repo

name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

jobs:
  deploy-staging:
    name: Deploy to staging
    # Only when CI passed AND deployment is switched on: set the repository
    # VARIABLE `DEPLOY_STAGING=true` (Settings -> Secrets and variables ->
    # Actions -> Variables) once the staging Supabase project + Environment
    # secrets exist. Until then this job is skipped, keeping Actions green.
    if: ${{ github.event.workflow_run.conclusion == 'success' && vars.DEPLOY_STAGING == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: staging
      url: ${{ vars.STAGING_APP_URL }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            services/pdf/package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix services/pdf

      - uses: supabase/setup-cli@v1
        with:
          version: 2.109.0

      - name: Push migrations to staging (forward-only, no reset)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_STAGING_PROJECT_REF: ${{ secrets.SUPABASE_STAGING_PROJECT_REF }}
          SUPABASE_STAGING_DB_PASSWORD: ${{ secrets.SUPABASE_STAGING_DB_PASSWORD }}
          SUPABASE_PROD_PROJECT_REF: ${{ secrets.SUPABASE_PROD_PROJECT_REF }}
        run: npm run db:push:staging

      - name: Seed staging with FAKE demo data
        env:
          # Preferred: script builds + percent-encodes the URL itself from
          # these two (same secrets `push staging` already uses). SUPABASE_
          # STAGING_DB_URL is only an explicit override if set.
          SUPABASE_STAGING_PROJECT_REF: ${{ secrets.SUPABASE_STAGING_PROJECT_REF }}
          SUPABASE_STAGING_DB_PASSWORD: ${{ secrets.SUPABASE_STAGING_DB_PASSWORD }}
          SUPABASE_STAGING_DB_URL: ${{ secrets.SUPABASE_STAGING_DB_URL }}
          SUPABASE_PROD_PROJECT_REF: ${{ secrets.SUPABASE_PROD_PROJECT_REF }}
        run: npm run db:seed:staging

      - name: Build frontend (staging config)
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_PDF_SERVICE_URL: ${{ secrets.VITE_PDF_SERVICE_URL }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_SENTRY_ENV: staging
        run: npm run build

      - name: Typecheck/build PDF service (pre-flight; Railway builds its own image)
        run: npm run build --prefix services/pdf

      # Netlify CLI deploy of the already-built ./dist. NETLIFY_SITE_ID/
      # NETLIFY_AUTH_TOKEN are this Environment's own values (staging site),
      # so `--prod` here means "publish to this site's primary URL" — it does
      # NOT touch the production site, which has its own separate secrets.
      #
      # NOTE: if this Netlify site also has GitHub-native auto-deploy enabled,
      # that will ALSO build+deploy on push — redundant but harmless (same
      # commit, same build). To make this workflow the single source of truth
      # (recommended, since it keeps DB migrations + frontend + PDF service in
      # lockstep), disable auto-publishing in Netlify: Site settings -> Build
      # & deploy -> Stop builds.
      - name: Deploy frontend to Netlify (staging)
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: npx --yes netlify-cli@17 deploy --dir=dist --prod --message "Sanad 360 staging @ ${{ github.event.workflow_run.head_sha }}"

      # Railway CLI deploy of services/pdf — Railway builds the image itself
      # from services/pdf/Dockerfile on its own infrastructure (this job's
      # local `npm run build` above is just a fast TypeScript pre-flight).
      # RAILWAY_TOKEN is a Railway PROJECT token scoped to the staging
      # project; RAILWAY_SERVICE_ID selects the PDF service within it.
      # The service's own env vars (SUPABASE_URL, SUPABASE_ANON_KEY,
      # SUPABASE_SERVICE_ROLE_KEY, CORS_ORIGIN, SENTRY_DSN — see
      # services/pdf/.env.example) are configured ONCE in the Railway
      # dashboard, not pushed by this workflow.
      - name: Deploy PDF service to Railway (staging)
        working-directory: services/pdf
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: npx --yes @railway/cli@latest up --service "${{ secrets.RAILWAY_SERVICE_ID }}" --detach

      - name: Smoke check
        run: |
          set -e
          if [ -n "${{ vars.STAGING_PDF_HEALTH_URL }}" ]; then
            echo "Waiting for the PDF service to come up after deploy..."
            for i in $(seq 1 30); do
              if curl -sf "${{ vars.STAGING_PDF_HEALTH_URL }}" | grep -q '"status":"ok"'; then
                echo "PDF service healthy after ${i}0s"; break
              fi
              if [ "$i" = "30" ]; then echo "::error::PDF service did not become healthy"; exit 1; fi
              sleep 10
            done
          else
            echo "::warning::STAGING_PDF_HEALTH_URL not set — skipping PDF health check"
          fi
          if [ -n "${{ vars.STAGING_APP_URL }}" ]; then
            curl -sf "${{ vars.STAGING_APP_URL }}" -o /dev/null
            echo "Frontend reachable at ${{ vars.STAGING_APP_URL }}"
          else
            echo "::warning::STAGING_APP_URL not set — skipping frontend check"
          fi

  deploy-production:
    name: Deploy to production (manual approval)
    needs: deploy-staging
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # The "production" GitHub Environment MUST be configured with Required
    # Reviewers (see DEPLOYMENT.md) — that configuration is what blocks this
    # job until a human approves. Same commit as staging; NEVER seeds.
    environment:
      name: production
      url: ${{ vars.PROD_APP_URL }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            services/pdf/package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix services/pdf

      - uses: supabase/setup-cli@v1
        with:
          version: 2.109.0

      # Forward-only migrations. There is deliberately NO seed step in this
      # job, no SUPABASE_*_DB_URL secret in this environment, and
      # scripts/db-target.mjs aborts any `seed production` invocation.
      - name: Push migrations to production (forward-only, no reset, no seed)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROD_PROJECT_REF: ${{ secrets.SUPABASE_PROD_PROJECT_REF }}
          SUPABASE_PROD_DB_PASSWORD: ${{ secrets.SUPABASE_PROD_DB_PASSWORD }}
        run: npm run db:push:production

      - name: Build frontend (production config)
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_PDF_SERVICE_URL: ${{ secrets.VITE_PDF_SERVICE_URL }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_SENTRY_ENV: production
        run: npm run build

      - name: Typecheck/build PDF service (pre-flight; Railway builds its own image)
        run: npm run build --prefix services/pdf

      # Same CLI-deploy pattern as staging, reading the production
      # Environment's own Netlify site + Railway project secrets.
      - name: Deploy frontend to Netlify (production)
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: npx --yes netlify-cli@17 deploy --dir=dist --prod --message "Sanad 360 production @ ${{ github.event.workflow_run.head_sha }}"

      - name: Deploy PDF service to Railway (production)
        working-directory: services/pdf
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: npx --yes @railway/cli@latest up --service "${{ secrets.RAILWAY_SERVICE_ID }}" --detach

      - name: Smoke check
        run: |
          set -e
          if [ -n "${{ vars.PROD_PDF_HEALTH_URL }}" ]; then
            echo "Waiting for the PDF service to come up after deploy..."
            for i in $(seq 1 30); do
              if curl -sf "${{ vars.PROD_PDF_HEALTH_URL }}" | grep -q '"status":"ok"'; then
                echo "PDF service healthy after ${i}0s"; break
              fi
              if [ "$i" = "30" ]; then echo "::error::PDF service did not become healthy"; exit 1; fi
              sleep 10
            done
          else
            echo "::warning::PROD_PDF_HEALTH_URL not set — skipping PDF health check"
          fi
          if [ -n "${{ vars.PROD_APP_URL }}" ]; then
            curl -sf "${{ vars.PROD_APP_URL }}" -o /dev/null
            echo "Frontend reachable at ${{ vars.PROD_APP_URL }}"
          else
            echo "::warning::PROD_APP_URL not set — skipping frontend check"
          fi
