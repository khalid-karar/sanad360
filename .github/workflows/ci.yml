name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Typecheck, test (real RLS), build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            services/pdf/package-lock.json

      - name: Install dependencies (frontend + PDF service)
        run: |
          npm ci
          npm ci --prefix services/pdf

      - uses: supabase/setup-cli@v1
        with:
          # Pinned for reproducible CI (matches the version used in development)
          version: 2.109.0

      # Applies migrations 001-015 and seed.sql against a fresh local stack.
      - name: Start Supabase
        run: supabase start

      - name: Write .env from local stack credentials
        run: |
          supabase status -o env > supabase-status.env
          source supabase-status.env
          {
            echo "VITE_SUPABASE_URL=$API_URL"
            echo "VITE_SUPABASE_ANON_KEY=$ANON_KEY"
            echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY"
            echo "VITE_PDF_SERVICE_URL=http://127.0.0.1:3001"
          } > .env

      - name: Typecheck (frontend)
        run: npm run typecheck

      - name: Typecheck/build (PDF service)
        run: npm run build --prefix services/pdf

      # Playwright's Chromium download is ~150MB — cache it keyed on the
      # playwright version so warm runs skip the download entirely.
      - name: Get Playwright version
        id: pw
        run: echo "version=$(node -p "require('./services/pdf/node_modules/playwright/package.json').version")" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}

      - name: Install Playwright Chromium (PDF renderer)
        run: npm run install-chromium --prefix services/pdf

      - name: Start PDF service
        run: |
          node services/pdf/dist/index.js > pdf-service.log 2>&1 &
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:3001/health > /dev/null; then
              echo "PDF service up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          LOGHEAD=$(head -c 700 pdf-service.log | tr -s '[:space:]' ' ' || true)
          echo "::error::PDF service failed to start. Log: ${LOGHEAD}"
          echo "--- pdf-service.log ---"
          cat pdf-service.log || true
          echo "--- dist layout ---"
          ls -la services/pdf/dist | head -20
          echo "--- env var names present in .env ---"
          grep -o "^[A-Z_]*" .env
          echo "--- node ---"
          node --version
          exit 1

      # Integration tests run as REAL authenticated users against local RLS;
      # the PDF suites require the service started above.
      - name: Test
        run: npm test

      - name: Build (frontend)
        run: npm run build
