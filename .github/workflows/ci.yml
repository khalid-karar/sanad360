name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Typecheck, test (real RLS), build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            services/pdf/package-lock.json

      - name: Install dependencies (frontend + PDF service)
        run: |
          npm ci
          npm ci --prefix services/pdf

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      # Applies migrations 001-008 and seed.sql against a fresh local stack.
      - name: Start Supabase
        run: supabase start

      - name: Write .env from local stack credentials
        run: |
          supabase status -o env > supabase-status.env
          source supabase-status.env
          {
            echo "VITE_SUPABASE_URL=$API_URL"
            echo "VITE_SUPABASE_ANON_KEY=$ANON_KEY"
            echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY"
            echo "VITE_PDF_SERVICE_URL=http://localhost:3001"
          } > .env

      - name: Typecheck (frontend)
        run: npm run typecheck

      - name: Typecheck/build (PDF service)
        run: npm run build --prefix services/pdf

      - name: Install Playwright Chromium (PDF renderer)
        run: npm run install-chromium --prefix services/pdf

      - name: Start PDF service
        run: |
          node services/pdf/dist/index.js &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3001/health > /dev/null; then exit 0; fi
            sleep 1
          done
          echo "PDF service failed to start" && exit 1

      # Integration tests run as REAL authenticated users against local RLS;
      # the PDF suites require the service started above.
      - name: Test
        run: npm test

      - name: Build (frontend)
        run: npm run build
